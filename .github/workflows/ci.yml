name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    name: Lint, Test, And Build
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.11"
      DBT_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/nyc-taxi-dbt:latest
      SPARK_LOCAL_IP: 127.0.0.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Set up Java for Spark tests
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Ruff check
        run: python -m ruff check src tests dags scripts

      - name: Black format check
        run: python -m black --check src tests dags scripts

      - name: Run tests
        run: python -m pytest

      - name: Validate Docker Compose config
        run: docker compose --env-file .env.example config --quiet

      - name: Build dbt Docker image
        run: docker build -f dbt/nyc_taxi/Dockerfile -t "${DBT_IMAGE}" .

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Push dbt Docker image
        run: docker push "${DBT_IMAGE}"
